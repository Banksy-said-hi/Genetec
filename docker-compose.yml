services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmanager-postgres
    environment:
      POSTGRES_USER: bookmanager
      POSTGRES_PASSWORD: bookmanager
      POSTGRES_DB: bookmanager
    ports:
      - "5432:5432"
    volumes:
      - bookmanager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmanager -d bookmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bookmanager_pgdata:
